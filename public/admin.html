<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Portfolio Admin</title><script src="https://cdn.tailwindcss.com"></script><style>.input{width:100%;border-radius:1rem;border:1px solid rgb(51 65 85);background:rgb(2 6 23/.72);padding:.8rem 1rem;color:white;outline:none}.input:focus{border-color:rgb(34 211 238/.8)}</style></head><body class="min-h-screen bg-slate-950 text-slate-100"><header class="border-b border-slate-800 px-5 py-5"><div class="mx-auto flex max-w-6xl items-center justify-between"><div><h1 class="text-xl font-black text-white">Portfolio Admin</h1><p class="text-sm text-slate-400">CRUD Skills, Experience, and Contact</p></div><div class="flex gap-3"><a href="/" class="rounded-xl border border-slate-700 px-4 py-2 text-sm text-slate-300">View Site</a><button id="logoutBtn" class="hidden rounded-xl border border-red-400/40 px-4 py-2 text-sm text-red-200" onclick="logout()">Logout</button></div></div></header><main class="mx-auto max-w-6xl px-5 py-8"><section id="loginBox" class="mx-auto max-w-md rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><h2 class="text-2xl font-black text-white">Login</h2><p class="mt-2 text-sm text-slate-400">Masuk dulu untuk mengubah data portfolio.</p><form id="loginForm" class="mt-6 grid gap-4"><div><label class="mb-2 block text-sm text-slate-300">Username</label><input id="loginUsername" class="input" placeholder="admin" required/></div><div><label class="mb-2 block text-sm text-slate-300">Password</label><input id="loginPassword" class="input" type="password" placeholder="Password" required/></div><button class="rounded-2xl bg-cyan-300 px-5 py-3 text-sm font-bold text-slate-950">Login</button><p id="loginMessage" class="text-sm text-red-300"></p></form></section><section id="adminBox" class="hidden"><div class="mb-6 flex flex-wrap gap-3"><button class="tab-btn rounded-2xl bg-cyan-300 px-5 py-3 text-sm font-bold text-slate-950" data-tab="skillsTab">Skills</button><button class="tab-btn rounded-2xl border border-slate-700 px-5 py-3 text-sm font-bold text-slate-300" data-tab="experiencesTab">Experience</button><button class="tab-btn rounded-2xl border border-slate-700 px-5 py-3 text-sm font-bold text-slate-300" data-tab="contactsTab">Contact</button></div><div id="skillsTab" class="tab-content"><div class="grid gap-6 lg:grid-cols-[0.9fr_1.1fr]"><form id="skillForm" class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><input type="hidden" id="skillId"/><h2 class="mb-5 text-xl font-black text-white">Add / Edit Skill</h2><div class="grid gap-4"><input id="skillName" class="input" placeholder="Skill name" required/><input id="skillCategory" class="input" placeholder="Category"/><select id="skillLevel" class="input"><option>Beginner</option><option>Intermediate</option><option>Strong</option><option>Advanced</option></select><textarea id="skillDescription" class="input min-h-28" placeholder="Description"></textarea><input id="skillOrder" class="input" type="number" placeholder="Sort order" value="0"/><div class="flex gap-3"><button class="rounded-2xl bg-cyan-300 px-5 py-3 text-sm font-bold text-slate-950">Save</button><button type="button" onclick="clearSkillForm()" class="rounded-2xl border border-slate-700 px-5 py-3 text-sm text-slate-300">Clear</button></div></div></form><div class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><h2 class="mb-5 text-xl font-black text-white">Skill List</h2><div id="skillList" class="space-y-3"></div></div></div></div><div id="experiencesTab" class="tab-content hidden"><div class="grid gap-6 lg:grid-cols-[0.9fr_1.1fr]"><form id="experienceForm" class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><input type="hidden" id="experienceId"/><h2 class="mb-5 text-xl font-black text-white">Add / Edit Experience</h2><div class="grid gap-4"><input id="experienceTitle" class="input" placeholder="Title / Role" required/><input id="experienceCompany" class="input" placeholder="Company / Context"/><input id="experiencePeriod" class="input" placeholder="Period"/><textarea id="experienceDescription" class="input min-h-28" placeholder="Description"></textarea><input id="experienceTags" class="input" placeholder="Tags, separated by comma"/><input id="experienceOrder" class="input" type="number" placeholder="Sort order" value="0"/><div class="flex gap-3"><button class="rounded-2xl bg-cyan-300 px-5 py-3 text-sm font-bold text-slate-950">Save</button><button type="button" onclick="clearExperienceForm()" class="rounded-2xl border border-slate-700 px-5 py-3 text-sm text-slate-300">Clear</button></div></div></form><div class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><h2 class="mb-5 text-xl font-black text-white">Experience List</h2><div id="experienceList" class="space-y-3"></div></div></div></div><div id="contactsTab" class="tab-content hidden"><div class="grid gap-6 lg:grid-cols-[0.9fr_1.1fr]"><form id="contactForm" class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><input type="hidden" id="contactId"/><h2 class="mb-5 text-xl font-black text-white">Add / Edit Contact</h2><div class="grid gap-4"><select id="contactType" class="input"><option>Email</option><option>Phone</option><option>LinkedIn</option><option>Instagram</option><option>GitHub</option><option>Website</option></select><input id="contactLabel" class="input" placeholder="Label"/><input id="contactValue" class="input" placeholder="Value" required/><input id="contactUrl" class="input" placeholder="URL, example mailto: or https://"/><input id="contactOrder" class="input" type="number" placeholder="Sort order" value="0"/><div class="flex gap-3"><button class="rounded-2xl bg-cyan-300 px-5 py-3 text-sm font-bold text-slate-950">Save</button><button type="button" onclick="clearContactForm()" class="rounded-2xl border border-slate-700 px-5 py-3 text-sm text-slate-300">Clear</button></div></div></form><div class="rounded-3xl border border-slate-800 bg-slate-900/70 p-6"><h2 class="mb-5 text-xl font-black text-white">Contact List</h2><div id="contactList" class="space-y-3"></div></div></div></div></section></main><script>function e(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}async function api(url,opt={}){const r=await fetch(url,{headers:{'Content-Type':'application/json',...(opt.headers||{})},...opt});if(!r.ok){let er=await r.json().catch(()=>({message:'Request failed'}));throw new Error(er.message||'Request failed')}return r.json()}async function checkAuth(){try{await api('/api/me');showAdmin()}catch{showLogin()}}function showAdmin(){loginBox.classList.add('hidden');adminBox.classList.remove('hidden');logoutBtn.classList.remove('hidden');loadAll()}function showLogin(){loginBox.classList.remove('hidden');adminBox.classList.add('hidden');logoutBtn.classList.add('hidden')}loginForm.addEventListener('submit',async ev=>{ev.preventDefault();try{await api('/api/login',{method:'POST',body:JSON.stringify({username:loginUsername.value,password:loginPassword.value})});loginMessage.textContent='';showAdmin()}catch(err){loginMessage.textContent=err.message}});async function logout(){await api('/api/logout',{method:'POST'});showLogin()}document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>showTab(b.dataset.tab)));function showTab(id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tab-btn').forEach(b=>{b.className=b.dataset.tab===id?'tab-btn rounded-2xl bg-cyan-300 px-5 py-3 text-sm font-bold text-slate-950':'tab-btn rounded-2xl border border-slate-700 px-5 py-3 text-sm font-bold text-slate-300'})}async function loadAll(){await Promise.all([loadSkills(),loadExperiences(),loadContacts()])}function card({title,subtitle,onEdit,onDelete}){return `<div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-4"><div class="flex flex-col justify-between gap-4 sm:flex-row sm:items-center"><div><p class="font-bold text-white">${e(title)}</p><p class="mt-1 text-xs text-slate-400">${e(subtitle)}</p></div><div class="flex gap-2"><button onclick="${onEdit}" class="rounded-xl border border-cyan-300/40 px-4 py-2 text-xs font-bold text-cyan-200">Edit</button><button onclick="${onDelete}" class="rounded-xl border border-red-400/40 px-4 py-2 text-xs font-bold text-red-200">Delete</button></div></div></div>`}let skills=[];async function loadSkills(){skills=await api('/api/admin/skills');skillList.innerHTML=skills.map(i=>card({title:i.name,subtitle:`${i.category||'-'} • ${i.level||'-'} • order ${i.sort_order}`,onEdit:`editSkill(${i.id})`,onDelete:`deleteSkill(${i.id})`})).join('')}skillForm.addEventListener('submit',async ev=>{ev.preventDefault();const id=skillId.value;const p={name:skillName.value,category:skillCategory.value,level:skillLevel.value,description:skillDescription.value,sort_order:skillOrder.value};await api(id?`/api/admin/skills/${id}`:'/api/admin/skills',{method:id?'PUT':'POST',body:JSON.stringify(p)});clearSkillForm();loadSkills()});function editSkill(id){let i=skills.find(x=>x.id===id);if(!i)return;skillId.value=i.id;skillName.value=i.name||'';skillCategory.value=i.category||'';skillLevel.value=i.level||'Strong';skillDescription.value=i.description||'';skillOrder.value=i.sort_order||0}async function deleteSkill(id){if(!confirm('Delete this skill?'))return;await api(`/api/admin/skills/${id}`,{method:'DELETE'});loadSkills()}function clearSkillForm(){skillForm.reset();skillId.value=''}let experiences=[];async function loadExperiences(){experiences=await api('/api/admin/experiences');experienceList.innerHTML=experiences.map(i=>card({title:i.title,subtitle:`${i.company||'-'} • ${i.period||'-'} • order ${i.sort_order}`,onEdit:`editExperience(${i.id})`,onDelete:`deleteExperience(${i.id})`})).join('')}experienceForm.addEventListener('submit',async ev=>{ev.preventDefault();const id=experienceId.value;const p={title:experienceTitle.value,company:experienceCompany.value,period:experiencePeriod.value,description:experienceDescription.value,tags:experienceTags.value,sort_order:experienceOrder.value};await api(id?`/api/admin/experiences/${id}`:'/api/admin/experiences',{method:id?'PUT':'POST',body:JSON.stringify(p)});clearExperienceForm();loadExperiences()});function editExperience(id){let i=experiences.find(x=>x.id===id);if(!i)return;experienceId.value=i.id;experienceTitle.value=i.title||'';experienceCompany.value=i.company||'';experiencePeriod.value=i.period||'';experienceDescription.value=i.description||'';experienceTags.value=Array.isArray(i.tags)?i.tags.join(', '):(i.tags||'');experienceOrder.value=i.sort_order||0}async function deleteExperience(id){if(!confirm('Delete this experience?'))return;await api(`/api/admin/experiences/${id}`,{method:'DELETE'});loadExperiences()}function clearExperienceForm(){experienceForm.reset();experienceId.value=''}let contacts=[];async function loadContacts(){contacts=await api('/api/admin/contacts');contactList.innerHTML=contacts.map(i=>card({title:`${i.type} - ${i.label||'-'}`,subtitle:`${i.value||'-'} • order ${i.sort_order}`,onEdit:`editContact(${i.id})`,onDelete:`deleteContact(${i.id})`})).join('')}contactForm.addEventListener('submit',async ev=>{ev.preventDefault();const id=contactId.value;const p={type:contactType.value,label:contactLabel.value,value:contactValue.value,url:contactUrl.value,sort_order:contactOrder.value};await api(id?`/api/admin/contacts/${id}`:'/api/admin/contacts',{method:id?'PUT':'POST',body:JSON.stringify(p)});clearContactForm();loadContacts()});function editContact(id){let i=contacts.find(x=>x.id===id);if(!i)return;contactId.value=i.id;contactType.value=i.type||'Email';contactLabel.value=i.label||'';contactValue.value=i.value||'';contactUrl.value=i.url||'';contactOrder.value=i.sort_order||0}async function deleteContact(id){if(!confirm('Delete this contact?'))return;await api(`/api/admin/contacts/${id}`,{method:'DELETE'});loadContacts()}function clearContactForm(){contactForm.reset();contactId.value=''}checkAuth()</script></body></html>
